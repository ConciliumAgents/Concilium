<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="loop-token" content="__LOOP_TOKEN__">
<title>Concilium Debug Console</title>
<style>
  :root{--bg:#0f1420;--card:#1a2030;--line:#2a3344;--fg:#e6edf3;--dim:#8b98a9;--cyan:#39c5cf;--green:#3fb950;--red:#f85149;--yellow:#d29922;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--fg);font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,"PingFang SC",sans-serif}
  header{padding:16px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px}
  header h1{font-size:17px;margin:0;color:var(--cyan)}
  header .sub{color:var(--dim);font-size:12px}
  main{max-width:980px;margin:0 auto;padding:22px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:16px;margin-bottom:16px}
  label{display:block;font-size:12px;color:var(--dim);margin:10px 0 4px}
  input,textarea,select{width:100%;background:#0c111b;color:var(--fg);border:1px solid var(--line);border-radius:7px;padding:8px 10px;font:inherit}
  textarea{min-height:64px;resize:vertical}
  .row{display:flex;gap:14px}.row>div{flex:1}
  .chk{display:flex;align-items:center;gap:8px;margin-top:14px}.chk input{width:auto}
  button{background:var(--cyan);color:#04222b;border:0;border-radius:8px;padding:10px 18px;font-weight:700;cursor:pointer;font:inherit}
  button.ghost{background:transparent;color:var(--cyan);border:1px solid var(--cyan)}
  button:disabled{opacity:.5;cursor:not-allowed}
  .btns{display:flex;gap:10px;margin-top:16px}
  .seats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-top:8px}
  .seat{background:#0c111b;border:1px solid var(--line);border-radius:8px;padding:10px}
  .seat .nm{font-weight:700}.seat .meta{font-size:11px;color:var(--dim);margin-top:3px}
  .seat .role{font-size:11px;color:var(--cyan)}
  .seat.st-working{border-color:var(--yellow)}.seat.st-done{border-color:var(--green)}
  .seat.st-block,.seat.st-err{border-color:var(--red)}.seat.st-off{opacity:.45}
  .seat .status{font-size:12px;margin-top:6px}
  .st-working .status{color:var(--yellow)}.st-done .status{color:var(--green)}
  .st-block .status,.st-err .status{color:var(--red)}
  .badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:12px;font-weight:700}
  .b-PASS{background:rgba(63,185,80,.18);color:var(--green)}
  .b-BLOCK,.b-ERR{background:rgba(248,81,73,.18);color:var(--red)}
  .b-RUN{background:rgba(57,197,207,.18);color:var(--cyan)}
  #log{background:#0c111b;border:1px solid var(--line);border-radius:8px;padding:10px;height:260px;overflow:auto;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;white-space:pre-wrap}
  #log .l{color:var(--dim)}#log .l.hi{color:var(--fg)}
  #transcripts details{background:#0c111b;border:1px solid var(--line);border-radius:6px;margin:6px 0;padding:6px 10px}
  #transcripts summary{cursor:pointer;color:var(--cyan);font-size:12px}
  #transcripts pre{white-space:pre-wrap;font-family:ui-monospace,Menlo,monospace;font-size:11px;color:var(--fg);max-height:320px;overflow:auto;margin:8px 0 0}
  .hide{display:none}
  .hint{font-size:11px;color:var(--dim);margin-top:6px}
  .err{color:var(--red)}
  .debuggrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;margin-top:10px}
  .debugfield{background:#0c111b;border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:12px}
  .debugfield .k{color:var(--dim);font-size:11px}.debugfield .v{display:block;color:var(--fg);font-family:ui-monospace,SFMono-Regular,Menlo,monospace;overflow-wrap:anywhere}
</style>
</head>
<body>
<header>
  <h1>Concilium Debug Console</h1>
  <span class="sub">本地 127.0.0.1 · runtime adapter 预检 lane、席位与容量，再进入执行</span>
</header>
<main>
  <!-- 配置区 -->
  <section class="card" id="setup">
    <div class="row">
      <div>
        <label>本地项目文件夹（git 仓库）</label>
        <input id="repo" placeholder="/Users/you/your-project">
        <div class="hint" id="projinfo">输入路径后自动自检：是否 git 仓库、能桥接几份该项目的 Claude 记忆上桌。</div>
      </div>
    </div>
    <label>任务（要圆桌做什么）</label>
    <textarea id="task" placeholder="例：修复 X 模块的 Y bug，让测试通过；不要改测试文件。"></textarea>
    <div class="row">
      <div><label>项目总指挥</label><select id="commander"></select></div>
      <div><label>验证席</label><select id="reviewer"></select></div>
    </div>
    <div class="row">
      <div><label>最多轮数</label><input id="maxiters" type="number" value="3" min="1" max="10"></div>
      <div><label>测试/构建命令（可选）</label><input id="testcmd" placeholder="pytest -q"></div>
    </div>
    <div class="chk"><input type="checkbox" id="dryrun"><label style="margin:0">演练模式（dry-run，用桩不真调 agent，先看流程）</label></div>

    <label style="margin-top:16px">上桌 agent（本次自检到的）</label>
    <div class="seats" id="roster"></div>
    <div class="hint" id="rosterhint">加载中…</div>

    <div class="btns">
      <button class="ghost" id="preflight">预检</button>
      <button id="run">▶ 开跑</button>
      <button class="ghost" id="refresh">↻ 重新探测座位</button>
    </div>
    <div class="hint" id="routepreview">填写任务后可预检 lane 和席位状态。</div>
    <div class="debuggrid" id="debugfields">
      <div class="debugfield"><span class="k">route.lane</span><span class="v" data-dbg="route_lane">-</span></div>
      <div class="debugfield"><span class="k">preflight.status</span><span class="v" data-dbg="preflight_status">-</span></div>
      <div class="debugfield"><span class="k">guard.status</span><span class="v" data-dbg="guard_status">-</span></div>
      <div class="debugfield"><span class="k">request_fingerprint</span><span class="v" data-dbg="request_fingerprint">-</span></div>
    </div>
    <div class="hint err" id="formerr"></div>
  </section>

  <!-- 实时仪表盘 -->
  <section class="card hide" id="board">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
      <strong>第 <span id="round">0</span> 轮</strong>
      <span class="badge b-RUN" id="verdict">运行中</span>
      <span style="flex:1"></span>
      <button class="ghost" id="back">← 新一次</button>
    </div>
    <div class="seats" id="boardseats"></div>
    <label style="margin-top:14px">Debug Console 事件日志</label>
    <div id="log"></div>
    <label style="margin-top:14px">各座位发言（点开看完整产出）</label>
    <div id="transcripts"></div>
  </section>
</main>

<script>
const $ = s => document.querySelector(s);
const SEATS = ["claude","codex","hermes","kimi"];
const LOOP_TOKEN = document.querySelector('meta[name="loop-token"]')?.content || "";  // server 启动时注入，POST /api/run 必带
let doctor = {};
let preflightBlocked = false;

async function loadDoctor(){
  $("#rosterhint").textContent = "探测中…";
  try{
    const r = await fetch("/api/doctor"); const arr = await r.json();
    doctor = {}; arr.forEach(s=>doctor[s.seat]=s);
    renderRoster(arr); refreshSeatedSelects();
    $("#rosterhint").textContent = "勾选哪些 agent 上桌、各自用哪个脑子；总指挥/验证席只能从已勾选的里选。";
  }catch(e){ $("#rosterhint").innerHTML = '<span class="err">探测失败：'+e+'</span>'; }
}
function renderRoster(arr){
  // 只显示这次自检「检测到」的 agent（列表里出现即代表检测到，不再单独标 ✓）
  const avail = arr.filter(s=>s.available);
  $("#roster").innerHTML = avail.map(s=>{
    const ms = s.models||[];
    const opts = ms.map(m=>`<option value="${m.provider}|${m.model}"${m.default?" selected":""}>${m.provider}/${m.model}</option>`).join("");
    return `<div class="seat">
      <label style="display:flex;align-items:center;gap:6px;margin:0;cursor:pointer">
        <input type="checkbox" class="seat-chk" data-seat="${s.seat}" checked style="width:auto">
        <span class="nm">${s.seat}</span></label>
      <div class="meta">${s.strength||""}</div>
      <div class="meta capacity" data-seat="${s.seat}">capacity: ${s.capacity?.status || "unknown"}</div>
      <label style="margin:6px 0 2px">用哪个脑子</label>
      <select class="seat-model" data-seat="${s.seat}">${opts||'<option value="|">默认</option>'}</select>
    </div>`;
  }).join("") || '<div class="hint err">没自检到任何可用 agent</div>';
  document.querySelectorAll(".seat-chk").forEach(c=>c.onchange=refreshSeatedSelects);
}
function refreshSeatedSelects(){
  const seated = [...document.querySelectorAll(".seat-chk")].filter(c=>c.checked).map(c=>c.dataset.seat);
  const cur = {c:$("#commander").value, r:$("#reviewer").value};
  const opt = a => seated.map(x=>`<option value="${x}"${x===a?" selected":""}>${x}</option>`).join("");
  $("#commander").innerHTML = opt(seated.includes(cur.c)?cur.c:(seated.includes("claude")?"claude":seated[0]));
  $("#reviewer").innerHTML  = opt(seated.includes(cur.r)?cur.r:(seated.includes("codex")?"codex":seated[0]));
  clearPreview();
}

function boardSeatCard(seat){
  const d = doctor[seat]||{};
  return `<div class="seat st-idle" id="bs-${seat}"><div class="nm">${seat}</div>
    <div class="role" id="role-${seat}"></div>
    <div class="meta">${(d.model||"")} ${d.provider?("· "+d.provider):""}</div>
    <div class="status" id="ss-${seat}">○ 待命</div></div>`;
}
function logLine(t, hi){
  const el = $("#log"); const d=document.createElement("div");
  d.className="l"+(hi?" hi":""); d.textContent=t; el.appendChild(d); el.scrollTop=el.scrollHeight;
}
function setSeat(seat, st, txt){
  const c=$("#bs-"+seat); if(!c)return; c.className="seat st-"+st;
  $("#ss-"+seat).textContent=(st==="working"?"⟳ ":st==="idle"?"○ ":"● ")+txt;
}

function startRun(params){
  $("#setup").classList.add("hide"); $("#board").classList.remove("hide");
  $("#boardseats").innerHTML = SEATS.map(boardSeatCard).join("");
  $("#log").innerHTML=""; $("#transcripts").innerHTML=""; $("#round").textContent="0";
  const vb=$("#verdict"); vb.className="badge b-RUN"; vb.textContent="运行中";
  $("#role-"+params.commander) && ($("#role-"+params.commander).textContent="[总指挥]");
  $("#role-"+params.reviewer) && ($("#role-"+params.reviewer).textContent+=" [验证]");

  fetch("/api/run",{method:"POST",headers:{"Content-Type":"application/json","X-Loop-Token":LOOP_TOKEN},body:JSON.stringify(params)})
    .then(r=>r.json()).then(({run_id,error})=>{
      if(error){ logLine("启动失败："+error,true); return; }
      const es=new EventSource("/api/events?run="+run_id);
      es.onmessage=e=>{ const ev=JSON.parse(e.data); handle(ev); if(ev.type==="done") es.close(); };
      es.onerror=()=>{ logLine("（连接关闭）"); es.close(); };
    });
}

function collectParams(){
  const repo=$("#repo").value.trim(), task=$("#task").value.trim();
  if(!repo||!task){ throw new Error("仓库路径和任务都得填。"); }
  const seats=[...document.querySelectorAll(".seat-chk")].filter(c=>c.checked).map(c=>c.dataset.seat);
  if(!seats.length){ throw new Error("至少勾一个 agent 上桌。"); }
  const seat_models={};
  document.querySelectorAll(".seat-model").forEach(sel=>{
    if(seats.includes(sel.dataset.seat) && sel.value && sel.value!=="|"){
      const [provider,model]=sel.value.split("|"); seat_models[sel.dataset.seat]={provider,model};
    }
  });
  return {repo, task, commander:$("#commander").value, reviewer:$("#reviewer").value,
          max_iters:+$("#maxiters").value, test_cmd:$("#testcmd").value.trim(),
          dry_run:$("#dryrun").checked, seats, seat_models};
}

function clearPreview(){
  preflightBlocked = false;
  $("#run").disabled = false;
  $("#routepreview").textContent = "填写任务后可预检 lane 和席位状态。";
  setDebugFields({});
}

function applyCapacity(capacity){
  (capacity||[]).forEach(item=>{
    const el = document.querySelector(`.capacity[data-seat="${item.seat}"]`);
    if(el){
      const pct = item.percent_remaining == null ? "" : ` · ${item.percent_remaining}%`;
      el.textContent = `capacity: ${item.status}${pct}`;
    }
  });
}

function setDebugFields(data){
  const route = data.route || {};
  const pre = data.preflight || {};
  const guard = data.guard || {};
  document.querySelector('[data-dbg="route_lane"]').textContent = route.lane || "-";
  document.querySelector('[data-dbg="preflight_status"]').textContent = pre.status || "-";
  document.querySelector('[data-dbg="guard_status"]').textContent = guard.status || "-";
  document.querySelector('[data-dbg="request_fingerprint"]').textContent = data.request_fingerprint || "-";
}

async function runPreflight(){
  try{
    const params = collectParams();
    $("#formerr").textContent = "";
    $("#routepreview").textContent = "预检中…";
    const r = await fetch("/api/preflight", {
      method:"POST",
      headers:{"Content-Type":"application/json","X-Loop-Token":LOOP_TOKEN},
      body:JSON.stringify(params)
    });
    const data = await r.json();
    if(!r.ok || data.error){ throw new Error(data.error || `HTTP ${r.status}`); }
    setDebugFields(data);
    applyCapacity(data.capacity);
    const route = data.route || {};
    const pre = data.preflight || {};
    const seats = (route.required_seats || []).join(", ") || "none";
    const warnings = (pre.warnings || []).join("；");
    preflightBlocked = pre.status === "blocked";
    $("#run").disabled = preflightBlocked;
    if(preflightBlocked){
      $("#routepreview").innerHTML = `<span class="err">lane: ${route.lane || "-"} · blocked: ${(pre.blocking_seats || []).join(", ")}</span>`;
    }else if(pre.status === "warn"){
      $("#routepreview").textContent = `lane: ${route.lane || "-"} · required: ${seats} · warn: ${warnings || "capacity unknown"}`;
    }else{
      $("#routepreview").textContent = `lane: ${route.lane || "-"} · required: ${seats} · preflight: ${pre.status || "ok"}`;
    }
  }catch(e){
    preflightBlocked = false;
    $("#run").disabled = false;
    $("#formerr").textContent = "预检失败："+e.message;
  }
}
function handle(ev){
  switch(ev.type){
    case "start": logLine("开桌："+ev.task, true); break;
    case "round": $("#round").textContent=ev.it; SEATS.forEach(s=>setSeat(s,"idle","待命")); logLine("——— 第 "+ev.it+" 轮 ———",true); break;
    case "plan": logLine("派活："+ev.plan.map(p=>p.agent+"←"+p.subtask.slice(0,22)).join("; ")); break;
    case "seat":
      if(ev.phase==="start"){ setSeat(ev.agent,"working",ev.mode+" "+(ev.subtask||"").slice(0,16)); logLine("→ "+ev.agent+" ["+ev.mode+"] "+(ev.subtask||"").slice(0,40)); }
      else{ let st=ev.rc===0?"done":"err"; if(ev.mode==="review"){ st = ev.rc===0?"done":(ev.rc===2?"block":"err"); }
            setSeat(ev.agent,st,"rc="+ev.rc); logLine("✓ "+ev.agent+" ["+ev.mode+"] rc="+ev.rc); }
      break;
    case "verdict":{ const vb=$("#verdict"); vb.className="badge b-"+(ev.verdict||"RUN"); vb.textContent=ev.verdict; logLine("裁决："+ev.reviewer+" → "+ev.verdict,true); break; }
    case "log": logLine(ev.msg); break;
    case "transcript":{
      const el=$("#transcripts"); const d=document.createElement("details");
      const sm=document.createElement("summary"); sm.textContent=`第${$("#round").textContent}轮 · ${ev.agent} [${ev.mode}]`;
      const pre=document.createElement("pre"); pre.textContent=ev.text;
      d.appendChild(sm); d.appendChild(pre); el.appendChild(d); break;
    }
    case "finish":{ const vb=$("#verdict"); const m={PASS:"✅ 通过收工",BLOCK:"被拦下",ERR:"验证ERR",CAP:"触顶交还人工"}[ev.status]||ev.status;
            vb.className="badge b-"+(ev.status==="PASS"?"PASS":"BLOCK"); vb.textContent=m; logLine(m,true); break; }
    case "error": logLine("错误："+ev.msg,true); break;
    case "done": logLine("（本次结束，退出码 "+ev.rc+"）",true); break;
  }
}

$("#run").onclick=()=>{
  try{
    if(preflightBlocked){ $("#formerr").textContent="预检已阻断，请调整席位或配置后再运行。"; return; }
    const params = collectParams();
    $("#formerr").textContent="";
    startRun(params);
  }catch(e){ $("#formerr").textContent=e.message; }
};
$("#preflight").onclick=runPreflight;
$("#refresh").onclick=loadDoctor;
$("#back").onclick=()=>{ $("#board").classList.add("hide"); $("#setup").classList.remove("hide"); };

let projT;
$("#repo").addEventListener("input",()=>{ clearPreview(); clearTimeout(projT); projT=setTimeout(checkProject,500); });
$("#task").addEventListener("input",clearPreview);
$("#testcmd").addEventListener("input",clearPreview);
$("#dryrun").addEventListener("change",clearPreview);
async function checkProject(){
  const repo=$("#repo").value.trim();
  if(!repo){ $("#projinfo").textContent=""; return; }
  try{
    const d=await (await fetch("/api/project?repo="+encodeURIComponent(repo))).json();
    if(!d.exists){ $("#projinfo").innerHTML='<span class="err">⚠ 路径不存在</span>'; return; }
    if(!d.is_git){ $("#projinfo").innerHTML='<span class="err">⚠ 不是 git 仓库（圆桌靠 git 当记忆；先在该目录 git init 再来）</span>'; return; }
    let s='✓ git 仓库';
    s += d.claude_memory>0 ? ` · 检测到 ${d.claude_memory} 份该项目的 Claude 记忆，将一并桥接上桌` : ' · 未发现该项目的 Claude 记忆（首次跑正常）';
    $("#projinfo").innerHTML='<span style="color:var(--green)">'+s+'</span>';
  }catch(e){ $("#projinfo").textContent=''; }
}
loadDoctor();
</script>
</body>
</html>
