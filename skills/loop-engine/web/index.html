<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>圆桌会议 · Loop Engine</title>
<style>
  :root{--bg:#0f1420;--card:#1a2030;--line:#2a3344;--fg:#e6edf3;--dim:#8b98a9;--cyan:#39c5cf;--green:#3fb950;--red:#f85149;--yellow:#d29922;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--fg);font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,"PingFang SC",sans-serif}
  header{padding:16px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px}
  header h1{font-size:17px;margin:0;color:var(--cyan)}
  header .sub{color:var(--dim);font-size:12px}
  main{max-width:980px;margin:0 auto;padding:22px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:16px;margin-bottom:16px}
  label{display:block;font-size:12px;color:var(--dim);margin:10px 0 4px}
  input,textarea,select{width:100%;background:#0c111b;color:var(--fg);border:1px solid var(--line);border-radius:7px;padding:8px 10px;font:inherit}
  textarea{min-height:64px;resize:vertical}
  .row{display:flex;gap:14px}.row>div{flex:1}
  .chk{display:flex;align-items:center;gap:8px;margin-top:14px}.chk input{width:auto}
  button{background:var(--cyan);color:#04222b;border:0;border-radius:8px;padding:10px 18px;font-weight:700;cursor:pointer;font:inherit}
  button.ghost{background:transparent;color:var(--cyan);border:1px solid var(--cyan)}
  button:disabled{opacity:.5;cursor:not-allowed}
  .btns{display:flex;gap:10px;margin-top:16px}
  .seats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:8px}
  .seat{background:#0c111b;border:1px solid var(--line);border-radius:8px;padding:10px}
  .seat .nm{font-weight:700}.seat .meta{font-size:11px;color:var(--dim);margin-top:3px}
  .seat .role{font-size:11px;color:var(--cyan)}
  .seat.st-working{border-color:var(--yellow)}.seat.st-done{border-color:var(--green)}
  .seat.st-block,.seat.st-err{border-color:var(--red)}.seat.st-off{opacity:.45}
  .seat .status{font-size:12px;margin-top:6px}
  .st-working .status{color:var(--yellow)}.st-done .status{color:var(--green)}
  .st-block .status,.st-err .status{color:var(--red)}
  .badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:12px;font-weight:700}
  .b-PASS{background:rgba(63,185,80,.18);color:var(--green)}
  .b-BLOCK,.b-ERR{background:rgba(248,81,73,.18);color:var(--red)}
  .b-RUN{background:rgba(57,197,207,.18);color:var(--cyan)}
  #log{background:#0c111b;border:1px solid var(--line);border-radius:8px;padding:10px;height:260px;overflow:auto;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;white-space:pre-wrap}
  #log .l{color:var(--dim)}#log .l.hi{color:var(--fg)}
  .hide{display:none}
  .hint{font-size:11px;color:var(--dim);margin-top:6px}
  .err{color:var(--red)}
</style>
</head>
<body>
<header>
  <h1>⃝ 圆桌会议 · Loop Engine</h1>
  <span class="sub">Claude Code 为可指派的总指挥 · codex/hermes 各在原生壳入席 · 本地 127.0.0.1</span>
</header>
<main>
  <!-- 配置区 -->
  <section class="card" id="setup">
    <div class="row">
      <div>
        <label>目标仓库路径（必须是 git 仓库）</label>
        <input id="repo" placeholder="/Users/you/some-git-repo">
      </div>
    </div>
    <label>任务（要圆桌做什么）</label>
    <textarea id="task" placeholder="例：修复 X 模块的 Y bug，让测试通过；不要改测试文件。"></textarea>
    <div class="row">
      <div><label>项目总指挥</label><select id="commander"></select></div>
      <div><label>验证席</label><select id="reviewer"></select></div>
    </div>
    <div class="row">
      <div><label>最多轮数</label><input id="maxiters" type="number" value="3" min="1" max="10"></div>
      <div><label>测试/构建命令（可选）</label><input id="testcmd" placeholder="pytest -q"></div>
    </div>
    <div class="chk"><input type="checkbox" id="dryrun"><label style="margin:0">演练模式（dry-run，用桩不真调 agent，先看流程）</label></div>

    <label style="margin-top:16px">座位探测</label>
    <div class="seats" id="roster"></div>
    <div class="hint" id="rosterhint">加载中…</div>

    <div class="btns">
      <button id="run">▶ 开跑</button>
      <button class="ghost" id="refresh">↻ 重新探测座位</button>
    </div>
    <div class="hint err" id="formerr"></div>
  </section>

  <!-- 实时仪表盘 -->
  <section class="card hide" id="board">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
      <strong>第 <span id="round">0</span> 轮</strong>
      <span class="badge b-RUN" id="verdict">运行中</span>
      <span style="flex:1"></span>
      <button class="ghost" id="back">← 新一次</button>
    </div>
    <div class="seats" id="boardseats"></div>
    <label style="margin-top:14px">会议日志</label>
    <div id="log"></div>
  </section>
</main>

<script>
const $ = s => document.querySelector(s);
const SEATS = ["claude","codex","hermes"];
let doctor = {};

async function loadDoctor(){
  $("#rosterhint").textContent = "探测中…";
  try{
    const r = await fetch("/api/doctor"); const arr = await r.json();
    doctor = {}; arr.forEach(s=>doctor[s.seat]=s);
    renderRoster(arr); fillSelects(arr);
    $("#rosterhint").textContent = "点上方下拉指派总指挥/验证席；勾选哪些上桌由总指挥按特长分派。";
  }catch(e){ $("#rosterhint").innerHTML = '<span class="err">探测失败：'+e+'</span>'; }
}
function renderRoster(arr){
  $("#roster").innerHTML = arr.map(s=>{
    const off = s.available ? "" : " st-off";
    const alt = (s.alt&&s.alt.length)?`<div class="meta">可切异质：${s.alt.map(a=>a.provider).join(", ")}</div>`:"";
    return `<div class="seat${off}"><div class="nm">${s.seat} ${s.available?"✓":"✗未装"}</div>
      <div class="meta">${s.available?(s.model||"")+" · "+(s.provider||""):"不可上桌"}</div>
      <div class="meta">${s.strength||""}</div>${alt}</div>`;
  }).join("");
}
function fillSelects(arr){
  const avail = arr.filter(s=>s.available).map(s=>s.seat);
  const opt = a => avail.map(x=>`<option value="${x}"${x===a?" selected":""}>${x}</option>`).join("");
  $("#commander").innerHTML = opt(avail.includes("claude")?"claude":avail[0]);
  $("#reviewer").innerHTML  = opt(avail.includes("codex")?"codex":avail[0]);
}

function boardSeatCard(seat){
  const d = doctor[seat]||{};
  return `<div class="seat st-idle" id="bs-${seat}"><div class="nm">${seat}</div>
    <div class="role" id="role-${seat}"></div>
    <div class="meta">${(d.model||"")} ${d.provider?("· "+d.provider):""}</div>
    <div class="status" id="ss-${seat}">○ 待命</div></div>`;
}
function logLine(t, hi){
  const el = $("#log"); const d=document.createElement("div");
  d.className="l"+(hi?" hi":""); d.textContent=t; el.appendChild(d); el.scrollTop=el.scrollHeight;
}
function setSeat(seat, st, txt){
  const c=$("#bs-"+seat); if(!c)return; c.className="seat st-"+st;
  $("#ss-"+seat).textContent=(st==="working"?"⟳ ":st==="idle"?"○ ":"● ")+txt;
}

function startRun(params){
  $("#setup").classList.add("hide"); $("#board").classList.remove("hide");
  $("#boardseats").innerHTML = SEATS.map(boardSeatCard).join("");
  $("#log").innerHTML=""; $("#round").textContent="0";
  const vb=$("#verdict"); vb.className="badge b-RUN"; vb.textContent="运行中";
  $("#role-"+params.commander) && ($("#role-"+params.commander).textContent="[总指挥]");
  $("#role-"+params.reviewer) && ($("#role-"+params.reviewer).textContent+=" [验证]");

  fetch("/api/run",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(params)})
    .then(r=>r.json()).then(({run_id,error})=>{
      if(error){ logLine("启动失败："+error,true); return; }
      const es=new EventSource("/api/events?run="+run_id);
      es.onmessage=e=>{ const ev=JSON.parse(e.data); handle(ev); if(ev.type==="done") es.close(); };
      es.onerror=()=>{ logLine("（连接关闭）"); es.close(); };
    });
}
function handle(ev){
  switch(ev.type){
    case "start": logLine("开桌："+ev.task, true); break;
    case "round": $("#round").textContent=ev.it; SEATS.forEach(s=>setSeat(s,"idle","待命")); logLine("——— 第 "+ev.it+" 轮 ———",true); break;
    case "plan": logLine("派活："+ev.plan.map(p=>p.agent+"←"+p.subtask.slice(0,22)).join("; ")); break;
    case "seat":
      if(ev.phase==="start"){ setSeat(ev.agent,"working",ev.mode+" "+(ev.subtask||"").slice(0,16)); logLine("→ "+ev.agent+" ["+ev.mode+"] "+(ev.subtask||"").slice(0,40)); }
      else{ let st=ev.rc===0?"done":"err"; if(ev.mode==="review"){ st = ev.rc===0?"done":(ev.rc===2?"block":"err"); }
            setSeat(ev.agent,st,"rc="+ev.rc); logLine("✓ "+ev.agent+" ["+ev.mode+"] rc="+ev.rc); }
      break;
    case "verdict":{ const vb=$("#verdict"); vb.className="badge b-"+(ev.verdict||"RUN"); vb.textContent=ev.verdict; logLine("裁决："+ev.reviewer+" → "+ev.verdict,true); break; }
    case "log": logLine(ev.msg); break;
    case "finish":{ const vb=$("#verdict"); const m={PASS:"✅ 通过收工",BLOCK:"被拦下",ERR:"验证ERR",CAP:"触顶交还人工"}[ev.status]||ev.status;
            vb.className="badge b-"+(ev.status==="PASS"?"PASS":"BLOCK"); vb.textContent=m; logLine(m,true); break; }
    case "error": logLine("错误："+ev.msg,true); break;
    case "done": logLine("（本次结束，退出码 "+ev.rc+"）",true); break;
  }
}

$("#run").onclick=()=>{
  const repo=$("#repo").value.trim(), task=$("#task").value.trim();
  if(!repo||!task){ $("#formerr").textContent="仓库路径和任务都得填。"; return; }
  $("#formerr").textContent="";
  startRun({repo, task, commander:$("#commander").value, reviewer:$("#reviewer").value,
            max_iters:+$("#maxiters").value, test_cmd:$("#testcmd").value.trim(),
            dry_run:$("#dryrun").checked});
};
$("#refresh").onclick=loadDoctor;
$("#back").onclick=()=>{ $("#board").classList.add("hide"); $("#setup").classList.remove("hide"); };
loadDoctor();
</script>
</body>
</html>
